<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="planet" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#fff8d0"/>
      <stop offset="20%" stop-color="#ffd740"/>
      <stop offset="55%" stop-color="#ff9d2e"/>
      <stop offset="85%" stop-color="#d97c1f"/>
      <stop offset="100%" stop-color="#a85a13"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0%" stop-color="#e5ac52" stop-opacity="0"/>
      <stop offset="20%" stop-color="#e5ac52" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#fff8d0" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#e5ac52" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e5ac52" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <ellipse cx="32" cy="32" rx="28" ry="6" fill="url(#ring)" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="20" fill="url(#planet)" filter="url(#glow)"/>
  <ellipse cx="32" cy="32" rx="28" ry="6" fill="none" stroke="#e5ac52" stroke-width="1" opacity="0.8"/>
  <ellipse cx="32" cy="35" rx="28" ry="2" fill="#000" opacity="0.2"/>
</svg>
